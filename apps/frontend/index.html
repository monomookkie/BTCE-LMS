    <!-- เผื่อจอขาวโล่งตอนเปิดครั้งแรก (โดยเฉพาะ PWA standalone ที่ไม่มี browser UI/progress bar ให้เห็นว่ากำลังโหลด) —
         ตั้งพื้นหลัง+โลโก้ไว้ตรงนี้เป็น static HTML ไม่ต้องรอ JS bundle โหลดเสร็จก่อน React จะเข้ามาแทนที่เนื้อหาใน #root เองอัตโนมัติตอน mount -->
    <style>
      html, body { background: #0D1B2A; }
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #061523, #0D1B2A, #1A3A5C, #1A56DB);
      }
      #splash .splash-mark {
        position: relative;
        width: 72px;
        height: 72px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #splash .splash-ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: #ffffff;
        animation: splash-spin 0.9s linear infinite;
      }
      #splash img {
        width: 52px;
        height: 52px;
        border-radius: 11px;
        object-fit: contain;
        animation: splash-pulse 1.6s ease-in-out infinite;
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes splash-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.55; }
      }
    </style>
  </head>
