name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck / Lint / Build / Test
    runs-on: ubuntu-latest

    # backend integration tests hit a real DB (see apps/backend/vitest.config.ts /
    # globalSetup.ts — prisma migrate reset runs against this before every run)
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: btec_lms_test
          MYSQL_USER: btec
          MYSQL_PASSWORD: btecpassword
        ports:
          - 3307:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # MYSQL_USER above only gets scoped access to MYSQL_DATABASE by default — Prisma's
      # `migrate reset` needs to create/drop the test DB and a shadow DB, so widen the grant
      # the same way docker/init/01-grant.sh does for local dev.
      - name: Grant DB privileges for Prisma migrate
        run: mysql -h127.0.0.1 -P3307 -uroot -prootpassword -e "GRANT ALL PRIVILEGES ON *.* TO 'btec'@'%' WITH GRANT OPTION; FLUSH PRIVILEGES;"

      - name: Generate Prisma client
        run: pnpm --filter backend prisma generate

      - name: Build shared package
        run: pnpm --filter @btec-lms/shared build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
